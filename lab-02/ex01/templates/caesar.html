<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body>

<div class="container mt-4">

    <table class="table">

        <tr>
            <td style="text-align:center;font-weight:bold;font-size:25px;">
                CAESAR CIPHER
            </td>
        </tr>

        <!-- ENCRYPT -->
        <tr>
            <td style="font-weight:bold;color:blue">
                ENCRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/encrypt">

                    <div class="mb-3">
                        <label>Plain text:</label>
                        <input type="text" class="form-control"
                               name="inputPlainText"
                               placeholder="Input Plain Text"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Key:</label>
                        <input type="number" class="form-control"
                               name="inputKeyPlain"
                               placeholder="Input Key"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Encrypt
                    </button>

                </form>

                {% if encrypt_result %}
                <div class="alert alert-success mt-3">
                    <b>Encrypted Result:</b> {{ encrypt_result }}
                </div>
                {% endif %}

            </td>
        </tr>

        <!-- DECRYPT -->
        <tr>
            <td style="font-weight:bold;color:blue">
                DECRYPTION
            </td>
        </tr>

        <tr>
            <td>

                <form method="POST" action="/decrypt">

                    <div class="mb-3">
                        <label>Cipher text:</label>
                        <input type="text" class="form-control"
                               name="inputCipherText"
                               placeholder="Input Cipher Text"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Key:</label>
                        <input type="number" class="form-control"
                               name="inputKeyCipher"
                               placeholder="Input Key"
                               required>
                    </div>

                    <button type="submit" class="btn btn-success">
                        Decrypt
                    </button>

                </form>

                {% if decrypt_result %}
                <div class="alert alert-warning mt-3">
                    <b>Decrypted Result:</b> {{ decrypt_result }}
                </div>
                {% endif %}

            </td>
        </tr>

    </table>

</div>

</body>
</html>
